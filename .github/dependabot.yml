# Dependabot configuration for KitPilot.
#
# Initial-stage settings: scan monthly, only open PRs for security advisories.
# Skip minor/patch version-bump noise. Loosen later when CI is ready.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    # Ignore non-security version bumps to avoid PR floods. Security
    # advisories are still raised by Dependabot's security alerts.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
