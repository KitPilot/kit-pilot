name: CI

on:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    checks:
        name: Lint, types, tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.8.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.2
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm check-types

            - name: Tests
              run: pnpm test

    package:
        name: Build + validate VSIX
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.8.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.2
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build workspace build package
              run: pnpm --filter @kit-pilot/build run build

            - name: Build webview UI
              run: pnpm --filter @kit-pilot/vscode-webview run build

            - name: Package extension (.vsix)
              run: pnpm --filter kit-pilot vsix

            - name: Validate VSIX contents
              run: node scripts/validate-vsix.mjs bin/*.vsix

            - name: Upload validated artifact
              uses: actions/upload-artifact@v4
              with:
                  name: kit-pilot-vsix
                  path: bin/*.vsix
                  retention-days: 14
