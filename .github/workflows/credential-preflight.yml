name: Credential preflight

# Manually dispatchable check that the VSCE_PAT repository secret is valid,
# so a release tag is only pushed once publishing is known to work. Run this
# after rotating the marketplace PAT and before tagging a release.

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    verify-pat:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.8.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.2
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify marketplace credential
              working-directory: src
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: pnpm exec vsce verify-pat KitPilot
