name: Release

# Triggers on push of a semver tag (e.g. v0.1.3) for stable, or a
# pre-release tag (e.g. v0.1.10-pre.1) for the marketplace pre-release
# channel. Pre-releases are only visible to users who opt in via the
# extension page's "Switch to Pre-Release Version" button. Also exposes a
# manual "Run workflow" button via workflow_dispatch — useful for
# republishing.
#
# The flow: checkout the tagged commit, build everything, package the .vsix,
# publish to the VS Code Marketplace (with --pre-release when the tag has a
# -pre.N suffix), and create a GitHub Release with the .vsix attached. The
# CHANGELOG.md section for the matching version is used as the release body.

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"
            - "v[0-9]+.[0-9]+.[0-9]+-pre.[0-9]+"
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing tag to publish (e.g. v0.1.3 or v0.1.10-pre.1)"
                required: true

permissions:
    contents: write # required so the workflow can create GitHub Releases

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout tagged commit
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.tag || github.ref }}
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.8.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.19.2
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build workspace build package
              run: pnpm --filter @kit-pilot/build run build

            - name: Build webview UI
              run: pnpm --filter @kit-pilot/vscode-webview run build

            - name: Bundle extension
              run: pnpm --filter kit-pilot run bundle

            - name: Install vsce
              run: npm install -g @vscode/vsce@latest

            - name: Package extension (.vsix)
              working-directory: src
              run: vsce package --no-dependencies --allow-package-all-secrets

            - name: Publish to VS Code Marketplace
              working-directory: src
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
                  REF: ${{ github.event.inputs.tag || github.ref }}
              run: |
                  # Idempotency guard: a version can only ever be published once, so
                  # re-tagging an already-published version (e.g. tagging retroactively
                  # after a manual publish) skips the publish instead of failing the run.
                  # The GitHub Release step below still runs either way.
                  LOCAL_VERSION=$(node -p "require('./package.json').version")
                  if vsce show KitPilot.kit-pilot --json 2>/dev/null \
                      | jq -e --arg v "$LOCAL_VERSION" '.versions | map(.version) | index($v) != null' > /dev/null; then
                      echo "Version $LOCAL_VERSION is already on the Marketplace — skipping publish."
                      exit 0
                  fi
                  # Second net for the propagation race: the Marketplace read API
                  # can lag a fresh publish by several minutes, so the pre-check
                  # above may miss a version that IS already live. If the publish
                  # itself then reports "already exists", that is the same benign
                  # already-published case — succeed, don't fail the run.
                  EXTRA_FLAGS=""
                  if [[ "$REF" == *-pre.* ]]; then
                      echo "Detected pre-release tag — publishing to pre-release channel."
                      EXTRA_FLAGS="--pre-release"
                  else
                      echo "Publishing to stable channel."
                  fi
                  set +e
                  OUTPUT=$(vsce publish --no-dependencies --allow-package-all-secrets $EXTRA_FLAGS 2>&1)
                  STATUS=$?
                  set -e
                  echo "$OUTPUT"
                  if [ $STATUS -ne 0 ]; then
                      if echo "$OUTPUT" | grep -q "already exists"; then
                          echo "Version $LOCAL_VERSION is already on the Marketplace (read API lagged) — treating as published."
                          exit 0
                      fi
                      exit $STATUS
                  fi

            - name: Extract version from tag
              id: version
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  # Honor manual dispatch input if present
                  if [ -n "${{ github.event.inputs.tag }}" ]; then
                      TAG="${{ github.event.inputs.tag }}"
                  fi
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "version=${TAG#v}" >> $GITHUB_OUTPUT

            - name: Extract release notes from CHANGELOG.md
              run: |
                  version="${{ steps.version.outputs.version }}"
                  awk -v ver="## $version" '
                      $0 == ver { capture=1; next }
                      /^## / && capture { exit }
                      capture { print }
                  ' CHANGELOG.md > release-notes.md
                  if [ ! -s release-notes.md ]; then
                      echo "No matching ## $version section in CHANGELOG.md — falling back to a generic note." > release-notes.md
                      echo "" >> release-notes.md
                      echo "Install via the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=KitPilot.kit-pilot)." >> release-notes.md
                  fi
                  cat release-notes.md

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: KitPilot ${{ steps.version.outputs.tag }}
                  body_path: release-notes.md
                  files: src/kit-pilot-*.vsix
